# =============================================
# Application Configuration
# =============================================

# Application Info
spring.application.name=goods-price-comparison-service
server.port=8080

# =============================================
# Database Configuration (H2 - Default)
# =============================================
spring.datasource.url=jdbc:h2:mem:price_comparison;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =============================================
# Flyway Migration - DISABLED for H2
# =============================================
spring.flyway.enabled=false

# =============================================
# H2 Console (for development)
# =============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# Logging Configuration
# =============================================
logging.level.root=INFO
logging.level.com.example.goodsprice=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# File Upload Configuration
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# API Documentation (OpenAPI/Swagger)
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================
# OCR Configuration
# =============================================
ocr.google.vision.enabled=false
ocr.google.vision.api.key=${GOOGLE_VISION_API_KEY:}
ocr.tesseract.enabled=false
ocr.tesseract.data-path=${TESSDATA_PREFIX:/usr/share/tesseract-ocr/4.00/tessdata}

# =============================================
# Service Configuration
# =============================================
service.upload.dir=${UPLOAD_DIR:/tmp/receipts}
service.ocr.timeout-seconds=30

# =============================================
# Actuator / Health Check
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
