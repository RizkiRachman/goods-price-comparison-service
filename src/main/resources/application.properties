# =============================================
# Application Configuration
# =============================================

# Application Identity
spring.application.name=goods-price-comparison-service
server.port=8080

# Import modular configurations
spring.config.import=classpath:config/database.properties,\
                      classpath:config/cache.properties,\
                      classpath:config/llm.properties,\
                      classpath:config/ocr.properties,\
                      classpath:config/features.properties,\
                      classpath:config/logging.properties,\
                      classpath:config/service.properties

# Application Info
app.base-package=com.example.goodsprice
app.full-name=${spring.application.name}
app.environment=default
