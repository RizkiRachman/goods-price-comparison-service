# =============================================
# LLM Configuration
# =============================================

# Provider: local | openai | anthropic
core.llm.provider=local

# Local LLM (Ollama)
llm.local.base-url=http://localhost:11434
llm.local.model=llama3.2-vision
llm.local.timeout=30

# OpenAI
llm.openai.base-url=https://api.openai.com/v1
llm.openai.model=gpt-4-vision-preview
llm.openai.timeout=30
llm.openai.api-key=${OPENAI_API_KEY:}

# Anthropic
llm.anthropic.base-url=https://api.anthropic.com/v1
llm.anthropic.model=claude-3-opus
llm.anthropic.timeout=30
llm.anthropic.api-key=${ANTHROPIC_API_KEY:}

# Dynamic Config (references selected provider)
llm.config.base-url=${llm.${core.llm.provider}.base-url}
llm.config.model=${llm.${core.llm.provider}.model}
llm.config.timeout=${llm.${core.llm.provider}.timeout}
llm.config.api-key=${llm.${core.llm.provider}.api-key:}

# OCR Settings
ocr.timeout-seconds=${llm.config.timeout}
