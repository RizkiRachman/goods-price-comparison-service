# =============================================
# LLM Configuration
# =============================================

# Provider: local | openai | anthropic | gemini
llm.provider=gemini

# Provider Types (local = requires local service, cloud = API only)
# This determines initialization and availability checks
llm.local.type=local
llm.openai.type=cloud
llm.anthropic.type=cloud
llm.gemini.type=cloud

# Local LLM (Ollama)
llm.local.base-url=http://localhost:11434
llm.local.model=llama3.2-vision
llm.local.timeout=30

# OpenAI
llm.openai.base-url=https://api.openai.com/v1
llm.openai.model=gpt-4-vision-preview
llm.openai.timeout=30
llm.openai.api-key=${OPENAI_API_KEY:}

# Anthropic
llm.anthropic.base-url=https://api.anthropic.com/v1
llm.anthropic.model=claude-3-opus
llm.anthropic.timeout=30
llm.anthropic.api-key=${ANTHROPIC_API_KEY:}

# Google Gemini (Recommended - Free Tier)
# Get API key: https://ai.google.dev/
# Available models: gemini-1.5-flash, gemini-1.5-pro, gemini-2.0-flash-exp
# Use -latest suffix for latest stable version
llm.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
llm.gemini.model=gemini-3-flash-preview
llm.gemini.timeout=30
llm.gemini.api-key=${GEMINI_API_KEY:}

# Dynamic Config (references selected provider)
llm.config.base-url=${llm.${llm.provider}.base-url}
llm.config.model=${llm.${llm.provider}.model}
llm.config.timeout=${llm.${llm.provider}.timeout}
llm.config.api-key=${llm.${llm.provider}.api-key:}
llm.config.type=${llm.${llm.provider}.type:cloud}

# OCR Settings
ocr.timeout-seconds=${llm.config.timeout}
