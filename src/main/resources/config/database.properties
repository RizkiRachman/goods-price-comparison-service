# =============================================
# Database Configuration
# =============================================

# Default: H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:price_comparison;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection Pool - Optimized for async processing
# Increased pool size to handle concurrent async operations
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# Leak detection - helps identify connection leaks during development
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (Development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway - Disabled for H2
spring.flyway.enabled=false
