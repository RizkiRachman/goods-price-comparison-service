# =============================================
# Database Configuration
# =============================================

# PostgreSQL - All values must be provided via arguments/env vars
spring.datasource.url=jdbc:postgresql://${database-host}:${database-port}/${database-name}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${database-username}
spring.datasource.password=${database-password}

# Connection Pool - Optimized for async processing
# Increased pool size to handle concurrent async operations
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# Leak detection - helps identify connection leaks during development
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway - Disabled on startup, run via Maven profile (mvn flyway:migrate -Pflyway)
spring.flyway.enabled=false
spring.flyway.locations=filesystem:db/migration/tables,filesystem:db/migration/alter,filesystem:db/migration/data
