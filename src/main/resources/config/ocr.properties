# =============================================
# OCR Configuration
# =============================================

# OCR Provider Selection
# Options: ocr (default), llm, or hybrid (both)
ocr.provider=ocr

# =============================================
# Tesseract OCR Configuration
# =============================================

# Enable/disable Tesseract OCR
# IMPORTANT: Tesseract requires native library installation!
# Mac: brew install tesseract tesseract-lang
# Set to true only after installation
ocr.tesseract.enabled=false

# Path to Tesseract executable
# Linux/Mac: /usr/bin/tesseract or /opt/homebrew/bin/tesseract (Mac M1/M2)
# Windows: C:\Program Files\Tesseract-OCR\tesseract.exe
# Default: "tesseract" (assumes in PATH)
ocr.tesseract.executable-path=/opt/homebrew/bin/tesseract

# Path to tessdata directory (language models)
# Mac: /opt/homebrew/share/tessdata
# Linux: /usr/share/tesseract-ocr/4.00/tessdata
# If not set, uses system default
ocr.tesseract.data-path=/opt/homebrew/share/tessdata

# Language(s) for OCR recognition
# Examples: eng, ind, eng+ind
# Default: eng+ind for receipt processing
ocr.tesseract.language=eng+ind

# Page segmentation mode (0-13)
# 3 = Fully automatic page segmentation (default)
# 6 = Assume single uniform block of text
ocr.tesseract.page-segmentation-mode=3

# OCR Engine mode (0-3)
# 3 = Default (best available)
ocr.tesseract.ocr-engine-mode=3

# DPI for image preprocessing
# Higher = better accuracy, slower processing
ocr.tesseract.dpi=300

# Timeout in seconds
ocr.tesseract.timeout=30

# =============================================
# LLM OCR Configuration (Google Gemini)
# =============================================
# See llm.properties for LLM configuration

# =============================================
# General OCR Settings
# =============================================
ocr.timeout-seconds=30
ocr.max-file-size-mb=10
ocr.allowed-formats=jpg,jpeg,png,webp
