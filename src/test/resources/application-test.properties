# Test Configuration

# Import modular configurations (same as main)
spring.config.import=classpath:config/database.properties,\
                      classpath:config/cache.properties,\
                      classpath:config/llm.properties,\
                      classpath:config/features.properties,\
                      classpath:config/logging.properties,\
                      classpath:config/service.properties

# Use local provider for tests (no API key needed)
llm.provider=local

# In-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (use Hibernate DDL)
spring.flyway.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.example.goodsprice=DEBUG
logging.level.org.springframework.test=INFO