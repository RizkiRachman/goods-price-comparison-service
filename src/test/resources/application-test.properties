# Test Configuration

# Import modular configurations (same as main)
spring.config.import=classpath:config/database.properties,\
                      classpath:config/cache.properties,\
                      classpath:config/llm.properties,\
                      classpath:config/features.properties,\
                      classpath:config/logging.properties,\
                      classpath:config/service.properties

# Use local provider for tests (no API key needed)
llm.provider=local

# Database parameter defaults (overridden by H2 config below)
DATABASE_NAME=testdb
DATABASE_USERNAME=sa
DATABASE_PASSWORD=
DATABASE_HOST=localhost
DATABASE_PORT=5432

# In-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway - Enabled for tests (validates migrations against H2)
spring.flyway.enabled=true
spring.flyway.locations=filesystem:db/migration/tables,filesystem:db/migration/alter,filesystem:db/migration/data
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=WARN
logging.level.com.example.goodsprice=DEBUG
logging.level.org.springframework.test=INFO