# Kong API Gateway Configuration (like Gravitee)
# DB-less mode - declarative configuration

_format_version: "3.0"
_transform: true

# Services define the upstream APIs
services:
  - name: goods-price-service
    url: http://app:8080
    routes:
      - name: api-routes
        paths:
          - /v1
          - /v2
        strip_path: false
        preserve_host: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
      - name: key-auth
        config:
          key_names:
            - api-key
            - x-api-key
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          max_age: 3600
      - name: file-log
        config:
          path: /tmp/kong-access.log
          reopen: true

  - name: kong-admin
    url: http://localhost:8001
    routes:
      - name: admin-route
        paths:
          - /admin
        strip_path: true

# Consumers (API clients)
consumers:
  - username: mobile-app
    keyauth_credentials:
      - key: mobile-app-api-key-12345
  - username: web-dashboard
    keyauth_credentials:
      - key: web-dashboard-api-key-67890
  - username: admin-portal
    keyauth_credentials:
      - key: admin-api-key-abcde

# Upstreams (for load balancing - future use)
upstreams:
  - name: goods-price-upstream
    targets:
      - target: app:8080
        weight: 100
