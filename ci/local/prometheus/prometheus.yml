global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Application metrics (Spring Boot Actuator)
  - job_name: 'goods-price-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    scrape_interval: 5s

  # Jenkins metrics
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins:8080']

  # Kong metrics
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']

  # Docker container metrics (cAdvisor if available)
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
