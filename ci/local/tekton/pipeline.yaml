# Pipeline: Clone → Build → Test → Build Image → Push → Deploy
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
    - name: maven-settings
      optional: true
    - name: k8s-manifests
      optional: true
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: registry
      type: string
      default: "localhost:32242"
      description: "Registry URL. Get node IP: kubectl get nodes -o wide"
    - name: test-goals
      type: string
      default: "test"
      description: "Maven test goals: 'test' or 'verify'"

  tasks:
    # 1. Clone source code
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # 2. Maven build (skip tests)
    - name: build
      taskRef:
        name: maven-build
      runAfter: [clone]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings

    # 3. Maven test
    - name: test
      taskRef:
        name: maven-test
      runAfter: [build]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings
      params:
        - name: GOALS
          value: $(params.test-goals)

    # 4. Build image (Kaniko → tarball, no push)
    - name: build-image
      taskRef:
        name: kaniko-build
      runAfter: [test]
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"

    # 5. Push image to registry
    - name: push
      taskRef:
        name: podman-push
      runAfter: [build-image]
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"
        - name: REGISTRY
          value: $(params.registry)

    # 6. Deploy to Kubernetes
    - name: deploy
      taskRef:
        name: deploy-to-local
      runAfter: [push]
      workspaces:
        - name: k8s-manifests
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.registry)/$(params.image-name):$(context.pipelineRun.name)"
