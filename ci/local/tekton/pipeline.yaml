# Pipeline Definition
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
    - name: maven-settings
      optional: true
    - name: k8s-manifests
      description: Workspace containing Kubernetes deployment manifests
      optional: true
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: registry
      type: string
      description: "Registry URL (e.g., localhost:5000 or node-ip:nodeport). Get node IP with: kubectl get nodes -o wide"
      default: "localhost:32242"
    - name: test-args
      type: string
      default: "test"
      description: "Maven test args: 'test' for unit tests, 'verify' for integration/mutation tests"
  tasks:
    # 1. Clone source code
    - name: clone
      taskRef:
        name: git-clone
        kind: Task
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # 2. Build (skip tests)
    - name: build
      taskRef:
        name: maven-build
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings
      params:
        - name: GOALS
          value: "clean install"
        - name: MAVEN_OPTS
          value: "-Xmx2048m -Dorg.slf4j.simpleLogger.defaultLogLevel=info"

    # 3. Run tests
    - name: test
      taskRef:
        name: maven-test
      runAfter:
        - build
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings
      params:
        - name: TEST_ARGS
          value: "$(params.test-args)"
        - name: MAVEN_OPTS
          value: "-Xmx2048m"

    # 4. Build Docker image
    - name: docker-build
      taskRef:
        name: docker-build-push
      runAfter:
        - test
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"
        - name: REGISTRY
          value: "$(params.registry)"

    # 5. Deploy
    - name: deploy
      taskRef:
        name: deploy-to-local
      runAfter:
        - docker-build
      workspaces:
        - name: k8s-manifests
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.registry)/$(params.image-name):$(context.pipelineRun.name)"
