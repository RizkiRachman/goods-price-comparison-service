# Pipeline: Clone → Build → Test → Build Image → Push to Podman Registry
# Pushes to local Podman registry at host.docker.internal:5000
# Setup registry first: ./helpers/setup-podman-registry.sh setup
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-podman-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
    - name: maven-settings
      optional: true
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: podman-registry
      type: string
      default: "host.docker.internal:5000"
      description: "Podman registry URL. macOS: host.docker.internal:5000, Linux: <host-ip>:5000"
    - name: image-tag
      type: string
      default: "latest"
    - name: test-goals
      type: string
      default: "test"

  tasks:
    # 1. Clone source code
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # 2. Maven build (skip tests)
    - name: build
      taskRef:
        name: maven-build
      runAfter: [ clone ]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings

    # 3. Maven test
    - name: test
      taskRef:
        name: maven-test
      runAfter: [ build ]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings
      params:
        - name: GOALS
          value: $(params.test-goals)

    # 4. Build image (Kaniko → tarball)
    - name: build-image
      taskRef:
        name: kaniko-build
      runAfter: [ test ]
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(params.image-tag)"

    # 5. Push to Podman registry
    - name: push
      taskRef:
        name: podman-push
      runAfter: [ build-image ]
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(params.image-tag)"
        - name: REGISTRY
          value: $(params.podman-registry)
