# PipelineRun: Clone → Build → Test → Build Image → Push → Deploy
# Usage: kubectl create -f tekton/pipeline-run.yaml
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: goods-price-service-
  namespace: goods-price-ci
spec:
  pipelineRef:
    name: goods-price-service-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi
    - name: maven-settings
      configMap:
        name: maven-settings
  params:
    - name: git-url
      value: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      value: "main"
    - name: image-name
      value: "goods-price-comparison-service"
    - name: registry
      value: "10.89.0.2:32242"
    - name: test-goals
      value: "test"
