# PipelineRun: Push image to local Podman registry
# Usage: kubectl create -f tekton/pipeline-run-podman.yaml
# Prerequisite: ./helpers/setup-podman-registry.sh setup
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: goods-price-podman-
  namespace: goods-price-ci
spec:
  pipelineRef:
    name: goods-price-service-podman-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes: [ ReadWriteOnce ]
          resources:
            requests:
              storage: 1Gi
    - name: maven-settings
      configMap:
        name: maven-settings
  params:
    - name: git-url
      value: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      value: "main"
    - name: image-name
      value: "goods-price-comparison-service"
    - name: podman-registry
      value: "host.docker.internal:5000"
    - name: image-tag
      value: "latest"
    - name: test-goals
      value: "test"
