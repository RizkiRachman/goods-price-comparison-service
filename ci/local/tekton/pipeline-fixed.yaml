# Tekton CI/CD Pipeline - Fixed Version
# Fixes:
# 1. Simplified workspaces to avoid PVC binding issues
# 2. Uses imagePullPolicy: Never for local images
# 3. Adds registry configuration for kind cluster

# First, create a ConfigMap with Maven settings
cat <<'EOF' | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: maven-settings-cm
  namespace: goods-price-ci
data:
  settings.xml: |
    <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                  https://maven.apache.org/xsd/settings-1.0.0.xsd">
      <localRepository>/workspace/m2</localRepository>
    </settings>
EOF

---
# Task: Clone Git repository
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: goods-price-ci
spec:
  workspaces:
    - name: output
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: "main"
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.output.path)
      script: |
        #!/bin/sh
        set -e
        echo "Cloning $(params.url)@$(params.revision)..."
        git clone --branch $(params.revision) --depth 1 $(params.url) .
        echo "Clone complete!"

---
# Task: Maven Build
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
    - name: maven-cache
  params:
    - name: GOALS
      type: string
      default: "clean package"
  steps:
    - name: build
      image: maven:3.9-eclipse-temurin-17
      workingDir: $(workspaces.source.path)
      env:
        - name: MAVEN_OPTS
          value: "-Xmx2048m"
      script: |
        #!/bin/bash
        set -e
        echo "Building with Maven..."
        mvn $(params.GOALS) -DskipTests \
          -Dmaven.repo.local=$(workspaces.maven-cache.path) \
          --batch-mode \
          -Dorg.slf4j.simpleLogger.showDateTime=true \
          -Djava.awt.headless=true
        echo "Build complete!"

---
# Task: Build and Push Docker Image using Kaniko
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: docker-build
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
  params:
    - name: IMAGE
      type: string
    - name: REGISTRY
      type: string
      default: "docker-registry.default.svc.cluster.local:5000"
    - name: DOCKERFILE
      type: string
      default: "./Dockerfile"
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.14.0-debug
      workingDir: $(workspaces.source.path)
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
      command:
        - /kaniko/executor
      args:
        - --dockerfile=$(params.DOCKERFILE)
        - --context=$(workspaces.source.path)
        - --destination=$(params.REGISTRY)/$(params.IMAGE)
        - --insecure-registry=$(params.REGISTRY)
        - --insecure-pull
        - --skip-tls-verify
        - --cache=true
        - --cache-dir=/workspace/cache

---
# Task: Deploy to Kubernetes
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-app
  namespace: goods-price-ci
spec:
  params:
    - name: IMAGE
      type: string
    - name: NAMESPACE
      type: string
      default: "goods-price-ci"
    - name: REGISTRY
      type: string
  steps:
    - name: deploy
      image: bitnami/kubectl:latest
      script: |
        #!/bin/bash
        set -e
        
        echo "🚀 Deploying $(params.IMAGE)"
        
        # Create namespace if not exists
        kubectl create namespace $(params.NAMESPACE) --dry-run=client -o yaml | kubectl apply -f -
        
        # Create ConfigMap for app config
        kubectl create configmap app-config \
          --from-literal=spring.profiles.active=local \
          --from-literal=spring.datasource.url=jdbc:h2:mem:testdb \
          -n $(params.NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -
        
        # Apply deployment with IfNotPresent pull policy for local registry
        cat <<DEPLOYEOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: goods-price-service
          namespace: $(params.NAMESPACE)
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: goods-price-service
          template:
            metadata:
              labels:
                app: goods-price-service
            spec:
              containers:
              - name: app
                image: $(params.IMAGE)
                imagePullPolicy: IfNotPresent
                ports:
                - containerPort: 8080
                env:
                - name: SPRING_PROFILES_ACTIVE
                  value: "local"
                - name: SERVER_PORT
                  value: "8080"
                readinessProbe:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 10
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
        DEPLOYEOF
        
        # Apply service
        cat <<SERVICEEOF | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: goods-price-service
          namespace: $(params.NAMESPACE)
        spec:
          selector:
            app: goods-price-service
          ports:
          - port: 80
            targetPort: 8080
          type: ClusterIP
        SERVICEEOF
        
        # Wait for rollout
        echo "⏳ Waiting for rollout..."
        kubectl rollout status deployment/goods-price-service \
          -n $(params.NAMESPACE) \
          --timeout=300s
        
        echo "✅ Deployment successful!"
        kubectl get pods -n $(params.NAMESPACE) -l app=goods-price-service

---
# Pipeline Definition - Simplified
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
      description: "Shared workspace for source code and Maven cache"
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: registry
      type: string
      description: "Registry URL - for kind use: docker-registry.goods-price-ci.svc.cluster.local:5000"
      default: "docker-registry.goods-price-ci.svc.cluster.local:5000"
  tasks:
    # 1. Clone
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # 2. Build with Maven
    - name: build
      taskRef:
        name: maven-build
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: shared-workspace
      params:
        - name: GOALS
          value: "clean package -DskipTests"

    # 3. Build Docker image
    - name: docker-build
      taskRef:
        name: docker-build
      runAfter:
        - build
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"
        - name: REGISTRY
          value: "$(params.registry)"

    # 4. Deploy
    - name: deploy
      taskRef:
        name: deploy-app
      runAfter:
        - docker-build
      params:
        - name: IMAGE
          value: "$(params.registry)/$(params.image-name):$(context.pipelineRun.name)"
        - name: REGISTRY
          value: "$(params.registry)"

---
# PVC for workspace
cat <<'EOF' | kubectl apply -f -
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tekton-workspace-pvc
  namespace: goods-price-ci
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
EOF

echo ""
echo "✅ Pipeline applied successfully!"
echo ""
echo "To run the pipeline:"
echo "  tkn pipeline start goods-price-service-pipeline \\"
echo "    --namespace goods-price-ci \\"
echo "    --workspace name=shared-workspace,claimName=tekton-workspace-pvc \\"
echo "    --showlog"
echo ""
echo "Make sure your docker-registry is running in the goods-price-ci namespace!"
