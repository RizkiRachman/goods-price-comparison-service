apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: goods-price-ci
spec:
  workspaces:
    - name: output
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: "main"
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.output.path)
      script: |
        #!/bin/sh
        set -e
        echo "Cloning $(params.url)@$(params.revision)..."
        git clone --branch $(params.revision) --depth 1 $(params.url) .
        echo "Clone complete!"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
    - name: maven-cache
  params:
    - name: GOALS
      type: string
      default: "clean package"
  steps:
    - name: build
      image: maven:3.9-eclipse-temurin-17
      workingDir: $(workspaces.source.path)
      env:
        - name: MAVEN_OPTS
          value: "-Xmx2048m"
      script: |
        #!/bin/bash
        set -e
        echo "Building with Maven..."
        mvn $(params.GOALS) -DskipTests \
          -Dmaven.repo.local=$(workspaces.maven-cache.path) \
          --batch-mode
        echo "Build complete!"

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: docker-build
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
  params:
    - name: IMAGE
      type: string
    - name: REGISTRY
      type: string
      default: "localhost:5000"
    - name: DOCKERFILE
      type: string
      default: "./Dockerfile"
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.14.0-debug
      workingDir: $(workspaces.source.path)
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
      command:
        - /kaniko/executor
      args:
        - --dockerfile=$(params.DOCKERFILE)
        - --context=$(workspaces.source.path)
        - --destination=$(params.REGISTRY)/$(params.IMAGE)
        - --cache=true
        - --cache-dir=/workspace/cache

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-app
  namespace: goods-price-ci
spec:
  params:
    - name: IMAGE
      type: string
    - name: NAMESPACE
      type: string
      default: "goods-price-ci"
  steps:
    - name: deploy
      image: bitnami/kubectl:latest
      script: |
        #!/bin/bash
        set -e
        
        echo "Deploying $(params.IMAGE)"
        kubectl create namespace $(params.NAMESPACE) --dry-run=client -o yaml | kubectl apply -f -
        
        kubectl create configmap app-config \
          --from-literal=spring.profiles.active=local \
          --from-literal=spring.datasource.url=jdbc:h2:mem:testdb \
          -n $(params.NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -
        
        cat <<DEPLOY | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: goods-price-service
  namespace: $(params.NAMESPACE)
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goods-price-service
  template:
    metadata:
      labels:
        app: goods-price-service
    spec:
      containers:
      - name: app
        image: $(params.IMAGE)
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "local"
        - name: SERVER_PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
DEPLOY

        cat <<SVC | kubectl apply -f -
apiVersion: v1
kind: Service
metadata:
  name: goods-price-service
  namespace: $(params.NAMESPACE)
spec:
  selector:
    app: goods-price-service
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
SVC

        echo "Waiting for rollout..."
        kubectl rollout status deployment/goods-price-service -n $(params.NAMESPACE) --timeout=300s
        echo "Deployment complete!"

---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: registry
      type: string
      default: "localhost:5000"
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
    - name: build
      taskRef:
        name: maven-build
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: shared-workspace
      params:
        - name: GOALS
          value: "clean package -DskipTests"
    - name: docker-build
      taskRef:
        name: docker-build
      runAfter:
        - build
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"
        - name: REGISTRY
          value: "$(params.registry)"
    - name: deploy
      taskRef:
        name: deploy-app
      runAfter:
        - docker-build
      params:
        - name: IMAGE
          value: "$(params.registry)/$(params.image-name):$(context.pipelineRun.name)"
        - name: NAMESPACE
          value: "goods-price-ci"
