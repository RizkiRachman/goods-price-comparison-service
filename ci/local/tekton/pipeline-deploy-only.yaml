# Pipeline: Deploy Only (from external registry)
# Use when image is already built and pushed to Quay/Docker Hub
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-from-registry-pipeline
  namespace: goods-price-ci
spec:
  params:
    - name: image
      type: string
      description: "Full image URL from registry (e.g., localhost:8080/admin/app:latest)"
    - name: namespace
      type: string
      default: "goods-price-ci"
  workspaces:
    - name: k8s-manifests
      description: Kubernetes manifests workspace
  tasks:
    - name: deploy
      taskRef:
        name: deploy-from-registry
      workspaces:
        - name: k8s-manifests
          workspace: k8s-manifests
      params:
        - name: IMAGE
          value: "$(params.image)"
        - name: NAMESPACE
          value: "$(params.namespace)"
