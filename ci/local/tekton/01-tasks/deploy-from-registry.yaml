# Task: Deploy from External Registry (Quay, Docker Hub, etc.)
# Skips build - just deploys pre-built image
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-from-registry
  namespace: goods-price-ci
spec:
  params:
    - name: IMAGE
      type: string
      description: "Full image path from registry (e.g., quay.io/user/app:tag)"
    - name: NAMESPACE
      type: string
      default: "goods-price-ci"
    - name: DEPLOYMENT_FILE
      type: string
      default: "ci/local/k8s/deployment.yaml"
    - name: ROLLOUT_TIMEOUT
      type: string
      default: "300s"
  workspaces:
    - name: k8s-manifests
      description: Workspace containing Kubernetes manifests
  steps:
    - name: pre-deploy-cleanup
      image: bitnami/kubectl:latest
      script: |
        #!/bin/bash
        set -e
        echo "🧹 Pre-deployment cleanup..."
        kubectl delete pods -n $(params.NAMESPACE) \
          -l app=goods-price-service \
          --grace-period=0 --force --ignore-not-found=true || true
        sleep 2
        echo "✅ Cleanup complete"

    - name: deploy
      image: bitnami/kubectl:latest
      env:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: NAMESPACE
          value: $(params.NAMESPACE)
      script: |
        #!/bin/bash
        set -e
        
        echo "🚀 Deploying ${IMAGE} to ${NAMESPACE}"
        
        # Update deployment image directly
        kubectl set image deployment/goods-price-service \
          app="${IMAGE}" \
          -n "${NAMESPACE}"
        
        # Ensure pull policy is Always for external registry
        kubectl patch deployment/goods-price-service -n "${NAMESPACE}" -p \
          '{"spec":{"template":{"spec":{"containers":[{"name":"app","imagePullPolicy":"Always"}]}}}}'
        
        # Restart deployment
        kubectl rollout restart deployment/goods-price-service -n "${NAMESPACE}"
        
        echo "⏳ Waiting for rollout..."
        if kubectl rollout status deployment/goods-price-service \
          -n "${NAMESPACE}" \
          --timeout=$(params.ROLLOUT_TIMEOUT); then
          
          echo "✅ Deployment successful!"
          kubectl get deployment goods-price-service -n "${NAMESPACE}"
          kubectl get pods -n "${NAMESPACE}" -l app=goods-price-service
        else
          echo "❌ Rollout failed"
          kubectl describe deployment goods-price-service -n "${NAMESPACE}"
          exit 1
        fi
