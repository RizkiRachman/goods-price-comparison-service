# Task: Push image tarball to registry using Skopeo
# Reads the tarball produced by kaniko-build and pushes to the target registry
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: podman-push
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
  params:
    - name: IMAGE
      type: string
      description: "Image name and tag (must match what kaniko-build used)"
    - name: REGISTRY
      type: string
      default: "localhost:32242"
      description: "Target registry URL"
  steps:
    - name: push
      image: quay.io/skopeo/stable:latest
      script: |
        #!/bin/bash
        set -e

        TARBALL="$(workspaces.source.path)/image.tar"
        DESTINATION="$(params.REGISTRY)/$(params.IMAGE)"

        if [ ! -f "$TARBALL" ]; then
          echo "ERROR: image tarball not found at $TARBALL"
          exit 1
        fi

        echo "Pushing $(params.IMAGE) → $DESTINATION"

        skopeo copy \
          --dest-tls-verify=false \
          "docker-archive:${TARBALL}" \
          "docker://${DESTINATION}"

        echo "Push complete: $DESTINATION"
