# Task: Maven Test - Run unit tests separately
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-test
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
    - name: maven-settings
      optional: true
      description: Workspace containing Maven settings.xml
  params:
    - name: TEST_ARGS
      type: string
      default: "test"
      description: "Maven test goals (test for unit tests, or verify for mutation tests)"
    - name: MAVEN_OPTS
      type: string
      default: "-Xmx1024m"
  steps:
    - name: test
      image: maven:3.9-eclipse-temurin-17
      workingDir: $(workspaces.source.path)
      env:
        - name: MAVEN_OPTS
          value: $(params.MAVEN_OPTS)
        - name: GITHUB_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-maven-credentials
              key: username
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-maven-credentials
              key: token
              optional: true
      script: |
        #!/bin/bash
        set -e
        
        echo "🧪 Running tests..."
        
        # Build Maven command for tests
        MAVEN_ARGS="$(params.TEST_ARGS) --batch-mode"
        
        # Add settings.xml if maven-settings workspace is bound
        if [ -f "$(workspaces.maven-settings.path)/settings.xml" ]; then
          echo "Using custom Maven settings from workspace"
          MAVEN_ARGS="$MAVEN_ARGS -s $(workspaces.maven-settings.path)/settings.xml"
        fi
        
        # Run tests
        mvn $MAVEN_ARGS
        
        echo "✅ Tests passed"

    - name: report
      image: busybox
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        echo "📊 Test Results:"
        
        # Check for test reports
        if [ -f "target/surefire-reports/"*.xml ]; then
          echo "Surefire reports found:"
          ls -la target/surefire-reports/*.xml | wc -l
        fi
        
        if [ -f "target/failsafe-reports/"*.xml ]; then
          echo "Failsafe reports found:"
          ls -la target/failsafe-reports/*.xml | wc -l
        fi
        
        echo ""
        echo "Test artifacts available in target/ directory"
