# Task: Maven Build (compile + package, skip tests)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: goods-price-ci
spec:
  workspaces:
    - name: source
    - name: maven-settings
      optional: true
  params:
    - name: MAVEN_OPTS
      type: string
      default: "-Xmx400m"
  steps:
    - name: build
      image: maven:3.9-eclipse-temurin-17
      workingDir: $(workspaces.source.path)
      env:
        - name: MAVEN_OPTS
          value: $(params.MAVEN_OPTS)
        - name: GITHUB_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-maven-credentials
              key: username
              optional: true
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-maven-credentials
              key: token
              optional: true
      script: |
        #!/bin/bash
        set -e
        MAVEN_ARGS="clean package -DskipTests --batch-mode"
        if [ -f "$(workspaces.maven-settings.path)/settings.xml" ]; then
          MAVEN_ARGS="$MAVEN_ARGS -s $(workspaces.maven-settings.path)/settings.xml"
        fi
        mvn $MAVEN_ARGS
        echo "Build complete: $(ls target/*.jar)"
