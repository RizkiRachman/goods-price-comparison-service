apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-app
  namespace: goods-price-ci
spec:
  params:
    - name: IMAGE
      type: string
    - name: NAMESPACE
      type: string
      default: "goods-price-ci"
  steps:
    - name: deploy
      image: bitnami/kubectl:latest
      script: |
        #!/bin/bash
        set -e
        
        echo "Deploying $(params.IMAGE)"
        kubectl create namespace $(params.NAMESPACE) --dry-run=client -o yaml | kubectl apply -f -
        
        kubectl create configmap app-config \
          --from-literal=spring.profiles.active=local \
          --from-literal=spring.datasource.url=jdbc:h2:mem:testdb \
          -n $(params.NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -
        
        kubectl create deployment goods-price-service \
          --image=$(params.IMAGE) \
          --namespace=$(params.NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -
        
        kubectl patch deployment goods-price-service \
          -n $(params.NAMESPACE) \
          --type=json \
          -p='[{"op":"add","path":"/spec/template/spec/containers/0/readinessProbe","value":{"httpGet":{"path":"/","port":8080},"initialDelaySeconds":20,"periodSeconds":5}},{"op":"add","path":"/spec/template/spec/containers/0/livenessProbe","value":{"httpGet":{"path":"/","port":8080},"initialDelaySeconds":60,"periodSeconds":10}}]'
        
        kubectl create service clusterip goods-price-service \
          --tcp=80:8080 \
          --namespace=$(params.NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -
        
        echo "Waiting for rollout..."
        kubectl rollout status deployment/goods-price-service -n $(params.NAMESPACE) --timeout=300s
        echo "Deployment complete!"
