# Kubernetes Secret for Maven GitHub Credentials
# This secret contains GitHub credentials for accessing GitHub Packages Maven repository
#
# Setup Instructions:
# 1. Create a GitHub Personal Access Token (PAT) with 'read:packages' scope:
#    https://github.com/settings/tokens/new
#
# 2. Create the secret with your credentials:
#    kubectl create secret generic github-maven-credentials \
#      --from-literal=username=YOUR_GITHUB_USERNAME \
#      --from-literal=token=YOUR_GITHUB_PAT \
#      -n goods-price-ci
#
# 3. Verify the secret was created:
#    kubectl get secret github-maven-credentials -n goods-price-ci
#    kubectl describe secret github-maven-credentials -n goods-price-ci
#
# 4. Run the pipeline:
#    kubectl create -f tekton/pipeline-run.yaml -n goods-price-ci
#
# Important Notes:
# - The token should have 'read:packages' scope to access GitHub Packages
# - Keep your PAT secure and never commit it to version control
# - For CI/CD automation, use GitHub Actions secrets or environment variables
# - The secret is referenced in pipeline.yaml as 'github-maven-credentials'

apiVersion: v1
kind: Secret
metadata:
  name: github-maven-credentials
  namespace: goods-price-ci
type: Opaque
stringData:
  # Replace these with your actual GitHub credentials
  username: "YOUR_GITHUB_USERNAME"
  token: "YOUR_GITHUB_PERSONAL_ACCESS_TOKEN"

