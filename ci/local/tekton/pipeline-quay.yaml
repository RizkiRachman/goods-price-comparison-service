# Pipeline: Clone → Build → Test → Build Image → Push to Quay → Deploy
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: goods-price-service-quay-pipeline
  namespace: goods-price-ci
spec:
  workspaces:
    - name: shared-workspace
    - name: maven-settings
      optional: true
    - name: k8s-manifests
      optional: true
  params:
    - name: git-url
      type: string
      default: "https://github.com/RizkiRachman/goods-price-comparison-service.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-name
      type: string
      default: "goods-price-comparison-service"
    - name: quay-url
      type: string
      default: "localhost:8080"
    - name: quay-user
      type: string
      default: "admin"
    - name: test-goals
      type: string
      default: "test"

  tasks:
    # 1. Clone source code
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)

    # 2. Maven build (skip tests)
    - name: build
      taskRef:
        name: maven-build
      runAfter: [clone]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings

    # 3. Maven test
    - name: test
      taskRef:
        name: maven-test
      runAfter: [build]
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-settings
          workspace: maven-settings
      params:
        - name: GOALS
          value: $(params.test-goals)

    # 4. Build and push image to Quay (Kaniko)
    - name: build-image
      taskRef:
        name: docker-build-quay
      runAfter: [test]
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.image-name):$(context.pipelineRun.name)"
        - name: QUAY_URL
          value: $(params.quay-url)
        - name: QUAY_USER
          value: $(params.quay-user)

    # 5. Deploy
    - name: deploy
      taskRef:
        name: deploy-from-registry
      runAfter: [build-image]
      workspaces:
        - name: k8s-manifests
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: "$(params.quay-url)/$(params.quay-user)/$(params.image-name):$(context.pipelineRun.name)"
