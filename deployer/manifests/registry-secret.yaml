# Registry credentials secret
# Linked to the pipeline service account for authenticated pushes/pulls.
# If your registry has no auth, REGISTRY_USERNAME and REGISTRY_PASSWORD
# can be left empty — the secret will still be created but auth is skipped.
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: ${PIPELINE_NAMESPACE}
  annotations:
    tekton.dev/docker-0: http://${REGISTRY_KIND_HOST}:${REGISTRY_PORT}
type: kubernetes.io/basic-auth
stringData:
  username: "${REGISTRY_USERNAME:-}"
  password: "${REGISTRY_PASSWORD:-}"
