# Maven settings ConfigMap for GitHub Packages authentication
apiVersion: v1
kind: ConfigMap
metadata:
  name: maven-settings
  namespace: ${PIPELINE_NAMESPACE}
data:
  settings.xml: |
    <settings>
      <servers>
        <server>
          <id>github</id>
          <username>${GITHUB_USERNAME}</username>
          <password>${GITHUB_TOKEN}</password>
        </server>
      </servers>
    </settings>
