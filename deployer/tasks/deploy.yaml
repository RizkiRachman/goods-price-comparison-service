# Task: Deploy Application to Kubernetes
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy
  namespace: ${PIPELINE_NAMESPACE}
spec:
  workspaces:
    - name: source
  params:
    - name: IMAGE
      type: string
      description: "Full image reference to deploy"
    - name: NAMESPACE
      type: string
      default: "${DEPLOYMENT_NAMESPACE}"
    - name: DEPLOYMENT_NAME
      type: string
      default: "${DEPLOYMENT_NAME}"
    - name: DEPLOYMENT_PORT
      type: string
      default: "${DEPLOYMENT_PORT}"
    - name: ROLLOUT_TIMEOUT
      type: string
      default: "300s"
  steps:
    - name: deploy
      image: ${KUBECTL_IMAGE}
      env:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: DEPLOYMENT_NAME
          value: $(params.DEPLOYMENT_NAME)
      script: |
        #!/bin/bash
        set -e
        
        echo "🚀 Deploying ${IMAGE} to ${NAMESPACE}"
        
        cd $(workspaces.source.path)
        
        # Extract registry host from image
        REGISTRY_HOST=$(echo "${IMAGE}" | cut -d'/' -f1)
        
        echo "Configuring insecure registry: ${REGISTRY_HOST}"
        
        # Check if deployment exists, if not create a basic one
        if ! kubectl get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" &>/dev/null; then
          echo "📄 Creating new deployment..."
          kubectl create deployment "${DEPLOYMENT_NAME}" \
            -n "${NAMESPACE}" \
            --image="${IMAGE}" \
            --port=$(params.DEPLOYMENT_PORT)
          
          # Set image pull policy and pull secrets
          kubectl patch deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" -p '{"spec":{"template":{"spec":{"imagePullPolicy":"Always","imagePullSecrets":[{"name":"registry-credentials"}]}}}}' 2>/dev/null || true
        else
          echo "📄 Updating existing deployment..."
          kubectl set image deployment/"${DEPLOYMENT_NAME}" \
            -n "${NAMESPACE}" \
            "${DEPLOYMENT_NAME}"="${IMAGE}" || true
          
          kubectl patch deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}" -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"registry-credentials"}]}}}}' 2>/dev/null || true
        fi
        
        echo "⏳ Waiting for rollout to complete (timeout: $(params.ROLLOUT_TIMEOUT))..."
        
        if kubectl rollout status deployment/"${DEPLOYMENT_NAME}" \
          -n "${NAMESPACE}" \
          --timeout=$(params.ROLLOUT_TIMEOUT); then
          
          echo "✅ Deployment successful!"
          kubectl get deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}"
          kubectl get pods -n "${NAMESPACE}" -l app="${DEPLOYMENT_NAME}"
        else
          echo "❌ Rollout failed or timed out"
          kubectl describe deployment "${DEPLOYMENT_NAME}" -n "${NAMESPACE}"
          kubectl get pods -n "${NAMESPACE}" -l app="${DEPLOYMENT_NAME}" -o wide
          exit 1
        fi
