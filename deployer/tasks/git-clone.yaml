# Task: Git Clone with permission cleanup
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: ${PIPELINE_NAMESPACE}
spec:
  workspaces:
    - name: output
  params:
    - name: url
      type: string
      description: Git URL to clone
    - name: revision
      type: string
      description: Git revision to checkout
      default: main
  steps:
    - name: clone
      image: ${KUBECTL_IMAGE}
      script: |
        #!/bin/bash
        
        # Set HOME to writable location for git config
        export HOME=/tmp
        
        WORKSPACE_PATH="$(workspaces.output.path)"
        
        # Add safe.directory to bypass Git ownership security check
        git config --global --add safe.directory "$WORKSPACE_PATH"
        git config --global --add safe.directory /workspace/output
        
        # Clean up workspace with force
        if [ -d "$WORKSPACE_PATH" ]; then
          chmod -R 777 "$WORKSPACE_PATH" 2>/dev/null || true
          rm -rf "$WORKSPACE_PATH" 2>/dev/null || true
        fi
        
        # Create workspace directory
        mkdir -p "$WORKSPACE_PATH"
        
        # Clone the repository
        git clone "$(params.url)" "$WORKSPACE_PATH" --depth=1 --branch="$(params.revision)" --single-branch
        echo "Clone successful"
